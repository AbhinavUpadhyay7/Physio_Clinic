{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow border-0 p-4">

                <h2 class="mb-4">
                    Edit Appointment
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-primary">
                        Update Appointment
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
